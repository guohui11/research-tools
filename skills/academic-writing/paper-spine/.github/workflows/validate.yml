name: Validate skill

on:
  push:
  pull_request:

jobs:
  scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run script smoke tests
        run: python -m unittest discover -s tests
